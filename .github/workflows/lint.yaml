name: Lint & Build

on:
  push:
    branches: [main]
    paths: ['src/**', 'package.json', 'rollup.config.js']
  pull_request:
    branches: [main]
    paths: ['src/**', 'package.json', 'rollup.config.js']
  workflow_dispatch:

jobs:
  lint:
    name: Lint and build check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true
